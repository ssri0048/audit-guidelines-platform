name: Quality Gates — Knowledge Validation

# รันทุก Pull Request เสมอ — ห้ามใส่ paths filter:
# quality-gates เป็น required status ใน branch protection —
# ถ้า filter ทำให้ไม่รัน สถานะจะค้าง "Expected/Waiting" และ PR นั้น merge ไม่ได้ตลอดกาล
# (บทเรียนจริง: PR แก้เฉพาะ app/ แล้วค้าง) — รันทุกครั้ง (ไม่กี่วินาที) ถูกกว่าค้างหนึ่งครั้ง
on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Gate 1-6 + Policy: validate knowledge_store.json'
        run: node scripts/validate.js data/knowledge_store.json

      - name: 'Staging file: JSON parse check'
        run: node -e "JSON.parse(require('fs').readFileSync('data/knowledge_staging.json','utf8')); console.log('✅ staging JSON valid')"
